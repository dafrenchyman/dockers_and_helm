{{- if not .Values.sentinel.existingSecret }}
{{- $secretName := include "comfyui.sentinelSecretName" . -}}
{{- $existing := lookup "v1" "Secret" .Release.Namespace $secretName -}}
{{- $keyName := .Values.sentinel.secretKeyKey -}}
{{- $secretValue := .Values.sentinel.generatedSecretKey | default "" -}}
{{- if and $existing (hasKey $existing.data $keyName) -}}
{{- $secretValue = (index $existing.data $keyName | b64dec) -}}
{{- else if eq $secretValue "" -}}
{{- $secretValue = randAlphaNum 64 -}}  # pragma: allowlist secret
{{- end }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ $secretName }}
  labels:
    app.kubernetes.io/name: {{ .Chart.Name | quote }}
    app.kubernetes.io/instance: {{ .Release.Name | quote }}
    app.kubernetes.io/managed-by: "Helm"
    app.kubernetes.io/version: {{ (.Chart.AppVersion | default .Chart.Version) | quote }}
    helm.sh/chart: "{{ .Chart.Name }}-{{ .Chart.Version | replace "+" "_" }}"
type: Opaque
stringData:
  {{ $keyName }}: {{ $secretValue | quote }}
{{- end }}
