# values.yaml — Fooocus_extend with repo-managed seeded presets, styles, and wildcards
# This chart is built on the bjw-s "common" library chart.
# Ref docs: https://github.com/bjw-s-labs/helm-charts/tree/main/charts/library/common

################################################################################
# Image settings
################################################################################
global: {}

image:
  # -- Fooocus_extend image repository.
  repository: ghcr.io/dafrenchyman/fooocus_extend
  # -- Fooocus_extend image tag. `latest` tracks the latest main build.
  tag: latest
  # -- Image pull policy for the Fooocus_extend container. Leave this at
  # `IfNotPresent` for stable nodes, or switch to `Always` if you rely on
  # mutable tags such as `latest`.
  pullPolicy: IfNotPresent

################################################################################
# Runtime settings
################################################################################
fooocusExtend:
  # -- Optional timezone passed through to the container for log timestamps and
  # any runtime behavior that depends on local time.
  timezone: "America/Los_Angeles"
  # -- The UID that should own writable mounted paths inside the container.
  # This matters most for hostPath-style storage and other bind-mounted
  # Kubernetes volumes where you care about host-visible file ownership.
  uid: "1000"
  # -- The GID that should own writable mounted paths inside the container.
  # The chart also exposes pod-level security context controls, which are the
  # primary ownership mechanism for Kubernetes.
  gid: "1000"
  # -- Main Fooocus_extend web port exposed by the container.
  port: 7865
  # -- Arguments passed to `python launch.py`. The default `--listen` matches
  # the upstream container's remote-access behavior.
  cmdArgs: "--listen"
  # -- Replica count for the main deployment. Keep this at 1 unless you know
  # the storage and runtime behavior works for your workload. The seeded
  # defaults and persistent writable state are designed around a single-writer
  # deployment model by default.
  replicas: 1

################################################################################
# Resource requests and limits
################################################################################
resources:
  # -- GPU-enabled AI workloads can be memory hungry. Adjust CPU, memory, and
  # GPU requests to match your node capacity and scheduling requirements.
  # The default GPU limit assumes an NVIDIA device plugin is installed and that
  # this workload should reserve one GPU.
  requests:
    cpu: 500m
    memory: 4Gi
  limits:
    memory: 12Gi
    nvidia.com/gpu: 1

################################################################################
# Service: expose the main Fooocus_extend web UI/API
################################################################################
service:
  main:
    enabled: true
    controller: main
    type: ClusterIP
    ports:
      http:
        port: 7865
        targetPort: web
        protocol: TCP

################################################################################
# Ingress: optional HTTP(S) entrypoint to the Fooocus_extend UI/API
################################################################################
ingress:
  main:
    enabled: false
    className: nginx
    annotations: {}
    hosts:
      - host: fooocus-extend.nixoskubemini.home.arpa
        paths:
          - path: /
            pathType: Prefix
            service:
              identifier: main
              port: http
    tls: []

################################################################################
# Persistence: separate fast model storage from outputs and runtime state
################################################################################
persistence:
  # -- Models and model-adjacent assets. This path is usually best placed on
  # fast storage such as local NVMe. This directory is expected to contain
  # checkpoints, LoRAs, embeddings, VAE approximations, upscale models,
  # inpaint assets, controlnet assets, clip vision assets, and prompt
  # expansion files under the app's normal subdirectory layout.
  models:
    enabled: true
    type: hostPath
    hostPath: /mnt/local/kube/data/fooocus-extend/models
    hostPathType: DirectoryOrCreate
    advancedMounts:
      main:
        app:
          - path: /content/data/models
            readOnly: false

  # -- Generated images and related output artifacts. This path can usually use
  # slower capacity-oriented storage than the model assets. Keep this separate
  # from `models` if you want to place outputs on a larger but slower storage
  # class.
  outputs:
    enabled: true
    type: hostPath
    hostPath: /mnt/local/kube/data/fooocus-extend/outputs
    hostPathType: DirectoryOrCreate
    advancedMounts:
      main:
        app:
          - path: /content/data/outputs
            readOnly: false

  # -- Smaller runtime state including config, presets, styles, and wildcards.
  # The container seeds baked defaults into this volume only when files are
  # missing, so existing user customizations survive pod recreation and image
  # upgrades.
  runtime-state:
    enabled: true
    type: hostPath
    hostPath: /mnt/local/kube/data/fooocus-extend/state
    hostPathType: DirectoryOrCreate
    advancedMounts:
      main:
        app:
          - path: /content/data/state
            readOnly: false

################################################################################
# Kubernetes security context: primary ownership controls for Helm deployments
################################################################################
podSecurityContext:
  # -- Apply a filesystem group so mounted volumes are writable by the runtime
  # group even when the storage backend preserves ownership metadata.
  fsGroup: 1000
  # -- Only recurse ownership changes when Kubernetes detects a root mismatch.
  # This reduces avoidable startup churn on large persistent volumes.
  fsGroupChangePolicy: OnRootMismatch

# -- Optional container-level security context overrides. Leave empty unless
# you need to set capabilities, readOnlyRootFilesystem, seccompProfile, or
# similar low-level container settings.
containerSecurityContext: {}

################################################################################
# Advanced bjw-s common settings
################################################################################
# -- Optional node selector overrides.
nodeSelector: {}

# -- Optional toleration overrides.
tolerations: []

# -- Optional affinity overrides.
affinity: {}

# -- Optional default pod options override. When left empty, the chart creates
# pod defaults from the documented values above. Advanced users can override
# this if they need to bypass the chart's default fsGroup behavior entirely.
defaultPodOptions: {}

# -- Optional controller override. When left empty, the chart generates the
# main controller from the documented settings above. Most users should leave
# this empty and configure the workload through the higher-level values in this
# file so the generated README remains accurate.
controllers: {}
